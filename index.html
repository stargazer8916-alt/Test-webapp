<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standoff 2 Simulator</title>
    <style>
        /* БАЗОВЫЕ СТИЛИ И ТЁМНАЯ ТЕМА */
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ДИСКЛЕЙМЕР */
        .disclaimer {
            background-color: #e94560;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        /* ПАНЕЛЬ СТАТИСТИКИ (БАЛАНС) */
        .stats-panel {
            display: flex;
            gap: 20px;
            background: #16213e;
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        .stat-item {
            font-size: 18px;
            font-weight: bold;
        }
        .stars-text { color: #f9a826; }
        .gold-text { color: #ffd700; }

        /* КНОПКИ */
        button {
            background-color: #0f3460;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        button:hover {
            background-color: #e94560;
            transform: scale(1.05);
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
            transform: scale(1);
        }

        /* БЛОК КЕЙСА И АНИМАЦИИ */
        .case-container {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #e94560;
        }
        .case-screen {
            height: 100px;
            background: #0f3460;
            margin: 20px 0;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            overflow: hidden;
            position: relative;
        }

        /* АНИМАЦИЯ РУЛЕТКИ */
        .scrolling-text {
            position: absolute;
            animation: scrollDown 0.1s infinite linear;
            opacity: 0.5;
        }
        @keyframes scrollDown {
            0% { transform: translateY(-50px); }
            100% { transform: translateY(50px); }
        }
        .reveal-animation {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ИНВЕНТАРЬ И РЫНОК */
        .inventory-container {
            width: 100%;
            max-width: 600px;
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
        }
        .inventory-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        .skin-card {
            background: #0f3460;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            border-bottom: 4px solid;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .skin-price {
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="disclaimer">
        ВНИМАНИЕ: Этот бот (симулятор) НИКАК не связан с официальной игрой Standoff 2!
    </div>

    <div class="stats-panel">
        <div class="stat-item stars-text">Звёздочки: <span id="stars-balance">10</span></div>
        <div class="stat-item gold-text">Голда: <span id="gold-balance">0</span></div>
    </div>

    <div style="margin-bottom: 20px;">
        <button onclick="buyGold()">Купить 100 Голды (за 1 Звёздочку)</button>
    </div>

    <div class="case-container">
        <h2>Обычный Бокс</h2>
        <p>Цена: 50 Голды</p>
        <div class="case-screen" id="case-screen">
            <span>?</span>
        </div>
        <button id="open-btn" onclick="openCase()">ОТКРЫТЬ КЕЙС</button>
    </div>

    <div class="inventory-container">
        <h2>Инвентарь и Рынок</h2>
        <div class="inventory-list" id="inventory-list">
            </div>
    </div>

    <script>
        // ИГРОВЫЕ ПЕРЕМЕННЫЕ
        let stars = 10;
        let gold = 0;
        let inventory = [];
        let isOpening = false; // Блокировка кнопки во время анимации

        // БАЗА СКИНОВ (Название, Редкость, Цена продажи, Цвет рамки)
        const skinsDB = [
            { name: "Karambit Gold", rarity: "Arcane", price: 5000, color: "#eebb00", chance: 1 },
            { name: "AKR Treasure", rarity: "Legendary", price: 800, color: "#ff00ff", chance: 5 },
            { name: "AWM Sport", rarity: "Epic", price: 200, color: "#8a2be2", chance: 15 },
            { name: "M4A1 Samurai", rarity: "Rare", price: 50, color: "#4169e1", chance: 30 },
            { name: "G22 Frost", rarity: "Uncommon", price: 10, color: "#32cd32", chance: 49 }
        ];

        // ОБНОВЛЕНИЕ ИНТЕРФЕЙСА
        function updateUI() {
            document.getElementById('stars-balance').innerText = stars;
            document.getElementById('gold-balance').innerText = gold;
            renderInventory();
        }

        // ПОКУПКА ГОЛДЫ ЗА ЗВЕЗДЫ
        function buyGold() {
            if (stars >= 1) {
                stars -= 1;
                gold += 100;
                updateUI();
            } else {
                alert("Недостаточно Звёздочек!");
            }
        }

        // ЛОГИКА ВЫПАДЕНИЯ РАНДОМНОГО СКИНА НА ОСНОВЕ ШАНСОВ
        function getRandomSkin() {
            let rand = Math.random() * 100;
            let cumulativeChance = 0;
            
            for (let skin of skinsDB) {
                cumulativeChance += skin.chance;
                if (rand <= cumulativeChance) {
                    return skin;
                }
            }
            return skinsDB[skinsDB.length - 1]; // Запасной вариант
        }

        // ОТКРЫТИЕ КЕЙСА
        function openCase() {
            if (isOpening) return; // Если уже открывается, игнорируем клик
            
            const cost = 50;
            if (gold < cost) {
                alert("Недостаточно Голды! Обменяй Звёздочки.");
                return;
            }

            // Списываем голду
            gold -= cost;
            updateUI();
            
            isOpening = true;
            const openBtn = document.getElementById('open-btn');
            const screen = document.getElementById('case-screen');
            
            openBtn.disabled = true;
            openBtn.innerText = "ОТКРЫВАЕМ...";

            // ЗАПУСК АНИМАЦИИ РУЛЕТКИ
            screen.innerHTML = `<div class="scrolling-text">|||||||||||||</div>`;
            screen.style.color = "white";

            // Имитация времени прокрутки (2 секунды)
            setTimeout(() => {
                const wonSkin = getRandomSkin();
                
                // Добавляем в инвентарь (копируем объект, чтобы у каждого был уникальный ID в будущем)
                inventory.push({...wonSkin});

                // Показываем результат с анимацией
                screen.innerHTML = `<div class="reveal-animation" style="color: ${wonSkin.color}; text-align: center;">
                    <div style="font-size: 14px;">${wonSkin.rarity}</div>
                    <div>${wonSkin.name}</div>
                </div>`;
                
                updateUI();

                // Возвращаем кнопку
                isOpening = false;
                openBtn.disabled = false;
                openBtn.innerText = "ОТКРЫТЬ ЕЩЁ";

            }, 2000); // 2000 мс = 2 секунды
        }

        // ПРОДАЖА СКИНА
        function sellSkin(index) {
            const skinToSell = inventory[index];
            gold += skinToSell.price;
            inventory.splice(index, 1); // Удаляем из массива инвентаря
            updateUI();
        }

        // ОТРИСОВКА ИНВЕНТАРЯ
        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = ""; // Очищаем перед обновлением

            if (inventory.length === 0) {
                list.innerHTML = "<p style='color: #aaa;'>Инвентарь пуст. Открой бокс!</p>";
                return;
            }

            // Перебираем инвентарь и создаем карточки
            inventory.forEach((skin, index) => {
                const card = document.createElement('div');
                card.className = 'skin-card';
                card.style.borderColor = skin.color;
                
                card.innerHTML = `
                    <div style="color: ${skin.color}; font-weight: bold;">${skin.name}</div>
                    <div class="skin-price">Продать за ${skin.price} G</div>
                    <button onclick="sellSkin(${index})" style="padding: 5px; font-size: 12px; background-color: #e94560;">Продать</button>
                `;
                list.appendChild(card);
            });
        }

        // Инициализация при загрузке
        updateUI();

    </script>
</body>
</html>
