<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SO2 Ultra Simulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-deep: #0b0e14;
            --bg-panel: #1a1f2c;
            --accent: #ff9f43;
            --accent-glow: rgba(255, 159, 67, 0.4);
            --text-main: #f0f4fa;
            --text-dim: #7f8c8d;
            --uncommon: #55efc4;
            --rare: #74b9ff;
            --epic: #a29bfe;
            --legendary: #ff7675;
            --arcane: #fdcb6e;
            --gold: #ffd700;
            --silver: #bdc3c7;
            --border-color: #2d3436;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: linear-gradient(145deg, #0f131a 0%, #080b10 100%);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border-radius: 24px 24px 0 0;
            overflow: hidden;
        }

        /* Header */
        .header-bar {
            padding: 18px 20px;
            background: rgba(26, 31, 44, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .currency {
            font-weight: 700;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        .currency.gold { color: var(--gold); text-shadow: 0 0 8px #ffd70060; }
        .currency.silver { color: var(--silver); text-shadow: 0 0 8px #bdc3c760; }

        /* Content */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) var(--bg-panel);
        }

        .content::-webkit-scrollbar {
            width: 4px;
        }
        .content::-webkit-scrollbar-track {
            background: var(--bg-panel);
        }
        .content::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 8px;
        }

        .tab {
            display: none;
            animation: slideUp 0.4s ease;
        }
        .tab.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            margin: 20px 0 12px 10px;
            font-weight: 600;
        }

        /* Grid Cards */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .case-card {
            background: linear-gradient(145deg, #1e2432, #151b26);
            border-radius: 18px;
            padding: 18px 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 8px 0 rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
        }

        .case-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .case-card:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.5);
        }

        .case-card:active::before {
            left: 100%;
        }

        .case-name {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 16px;
            background: linear-gradient(135deg, #fff, #c0c0c0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .case-price {
            font-size: 14px;
            font-weight: 800;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            background: rgba(0,0,0,0.5);
        }

        /* Modal */
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeInModal 0.3s;
        }

        @keyframes fadeInModal {
            from { opacity: 0; backdrop-filter: blur(0); }
            to { opacity: 1; backdrop-filter: blur(8px); }
        }

        .case-modal {
            width: 92%;
            max-width: 360px;
            background: linear-gradient(145deg, #202636, #161c28);
            border-radius: 32px;
            padding: 24px 20px;
            border: 1px solid var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 2px var(--accent-glow);
            text-align: center;
            transform: scale(0.9);
            animation: zoomIn 0.3s forwards;
        }

        @keyframes zoomIn {
            to { transform: scale(1); }
        }

        .case-modal h2 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--accent), #ffd966);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .roulette-container {
            width: 100%;
            height: 100px;
            background: #0a0d12;
            border-radius: 16px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
            border: 2px solid #3a3f4b;
            box-shadow: inset 0 0 15px #00000080;
        }

        .roulette-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 4px;
            height: 100%;
            background: var(--accent);
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 20px var(--accent);
        }

        .track {
            display: flex;
            align-items: center;
            width: max-content;
            height: 100%;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .weapon-item {
            width: 90px;
            height: 90px;
            flex-shrink: 0;
            margin: 0 4px;
            border-radius: 12px;
            background: linear-gradient(145deg, #262d3b, #1a1f2a);
            border-bottom: 4px solid;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            padding: 8px 4px;
            box-shadow: 0 4px 0 #0b0e14;
            transition: all 0.2s;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 14px 0;
            border: none;
            border-radius: 40px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            transition: 0.2s;
            box-shadow: 0 6px 0 #0b0e14;
        }

        .btn-open {
            background: linear-gradient(145deg, var(--accent), #e67e22);
            color: #000;
            flex: 2;
        }

        .btn-open:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0b0e14;
        }

        .btn-open:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 6px 0 #0b0e14;
            pointer-events: none;
        }

        .btn-close {
            background: transparent;
            color: var(--text-dim);
            border: 2px solid var(--text-dim);
            box-shadow: none;
            flex: 1;
        }

        .btn-close:active {
            background: rgba(255,255,255,0.1);
        }

        /* Navigation */
        .nav-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: rgba(26, 31, 44, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 8px;
        }

        .nav-item {
            color: var(--text-dim);
            font-size: 12px;
            text-align: center;
            cursor: pointer;
            width: 25%;
            transition: 0.2s;
            padding: 8px 0;
            border-radius: 40px;
        }

        .nav-item.active {
            color: var(--accent);
            background: rgba(255, 159, 67, 0.15);
            transform: translateY(-4px);
        }

        .nav-item span {
            display: block;
            font-size: 22px;
            margin-bottom: 2px;
        }

        /* Inventory */
        .inv-item {
            background: linear-gradient(145deg, #1e2432, #151b26);
            border-radius: 14px;
            padding: 12px 6px;
            text-align: center;
            border-bottom: 4px solid;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 6px 0 #0b0e14;
            transition: 0.2s;
            animation: popIn 0.3s;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Notification */
        .notification {
            position: fixed;
            bottom: 90px;
            left: 20px;
            right: 20px;
            max-width: 360px;
            margin: 0 auto;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 16px 24px;
            border-left: 6px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 16px;
            transform: translateY(150%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 200;
        }

        .notification.show {
            transform: translateY(0);
        }

        .notif-icon {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .notif-content {
            flex: 1;
        }

        .notif-title {
            font-weight: 800;
            font-size: 14px;
            color: #ccc;
        }

        .notif-item {
            font-weight: 700;
            font-size: 18px;
            color: #fff;
        }

        /* Confetti canvas */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Canvas for confetti -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Header -->
    <div class="header-bar">
        <div class="currency gold">💰 <span id="gold-val">500</span> G</div>
        <div class="currency silver">🪙 <span id="silver-val">1000</span> S</div>
    </div>

    <!-- Content -->
    <div class="content">
        <div id="tab-shop" class="tab active">
            <div class="section-title">Gold Cases</div>
            <div class="grid">
                <div class="case-card" onclick="openCaseModal('Empire Case', 80, 'gold', 'Empire')">
                    <div class="case-name">⚡ Empire Case</div>
                    <div class="case-price" style="color: var(--gold);">80 G</div>
                </div>
                <div class="case-card" onclick="openCaseModal('Furious Case', 80, 'gold', 'Furious')">
                    <div class="case-name">🔥 Furious Case</div>
                    <div class="case-price" style="color: var(--gold);">80 G</div>
                </div>
                <div class="case-card" onclick="openCaseModal('Mystic Case', 150, 'gold', 'Mystic')">
                    <div class="case-name" style="background: linear-gradient(135deg, #a55eea, #eb3b5a); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🔮 Mystic Case</div>
                    <div class="case-price" style="color: var(--gold);">150 G</div>
                </div>
            </div>

            <div class="section-title">Silver Boxes</div>
            <div class="grid">
                <div class="case-card" onclick="openCaseModal('Common Box', 100, 'silver', 'Common')">
                    <div class="case-name">📦 Common Box</div>
                    <div class="case-price" style="color: var(--silver);">100 S</div>
                </div>
                <div class="case-card" onclick="openCaseModal('Rare Box', 250, 'silver', 'Rare')">
                    <div class="case-name" style="color: #74b9ff;">✨ Rare Box</div>
                    <div class="case-price" style="color: var(--silver);">250 S</div>
                </div>
            </div>
        </div>

        <div id="tab-inv" class="tab">
            <div class="section-title">Inventory (<span id="inv-count">0</span>)</div>
            <div class="grid" id="inv-grid" style="grid-template-columns: 1fr 1fr 1fr;"></div>
        </div>
    </div>

    <!-- Case Modal -->
    <div class="modal-overlay" id="caseModal">
        <div class="case-modal">
            <h2 id="modalName">Case Name</h2>
            <div class="roulette-container" id="roulette-container">
                <div class="track" id="rouletteTrack"></div>
            </div>
            <div class="btn-group">
                <button class="btn btn-open" id="btnOpen" onclick="startSpin()">Открыть</button>
                <button class="btn btn-close" id="btnClose" onclick="closeModal()">✕</button>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification">
        <div class="notif-icon">🎁</div>
        <div class="notif-content">
            <div class="notif-title">Вы получили</div>
            <div class="notif-item" id="notif-item"></div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('tab-shop', this)"><span>🛒</span>Магазин</div>
        <div class="nav-item" onclick="switchTab('tab-inv', this)"><span>🎒</span>Инвентарь</div>
    </div>
</div>

<script>
    (function() {
        // --- Состояние приложения ---
        let state = {
            gold: parseInt(localStorage.getItem('gold')) || 500,
            silver: parseInt(localStorage.getItem('silver')) || 1000,
            inv: JSON.parse(localStorage.getItem('inv')) || []
        };

        // --- База дропа (шансы в сумме 100) ---
        const pools = {
            'Empire': [
                { n: 'M4 | Samurai', c: 'var(--epic)', ch: 60 },
                { n: 'AKR | Necromancer', c: 'var(--epic)', ch: 25 },
                { n: 'AWM | Genesis', c: 'var(--legendary)', ch: 10 },
                { n: 'Karambit | Gold', c: 'var(--arcane)', ch: 5 }
            ],
            'Furious': [
                { n: 'G22 | Frost', c: 'var(--rare)', ch: 70 },
                { n: 'FAMAS | Fury', c: 'var(--epic)', ch: 25 },
                { n: 'Butterfly | Star', c: 'var(--arcane)', ch: 5 }
            ],
            'Mystic': [
                { n: 'USP-S | Neon', c: 'var(--uncommon)', ch: 50 },
                { n: 'M4 | Dragon', c: 'var(--rare)', ch: 30 },
                { n: 'Karambit | Fade', c: 'var(--legendary)', ch: 15 },
                { n: 'Gloves | Crimson', c: 'var(--arcane)', ch: 5 }
            ],
            'Common': [
                { n: 'USP | Pixel', c: 'var(--uncommon)', ch: 80 },
                { n: 'P90 | Ghost', c: 'var(--rare)', ch: 20 }
            ],
            'Rare': [
                { n: 'Deagle | Dragon', c: 'var(--epic)', ch: 80 },
                { n: 'M9 | Blue', c: 'var(--legendary)', ch: 20 }
            ]
        };

        // --- Текущие данные модалки ---
        let currentCase = { name: '', price: 0, currency: '', poolKey: '' };
        let isSpinning = false;

        // --- Элементы DOM ---
        const goldSpan = document.getElementById('gold-val');
        const silverSpan = document.getElementById('silver-val');
        const modal = document.getElementById('caseModal');
        const modalName = document.getElementById('modalName');
        const track = document.getElementById('rouletteTrack');
        const btnOpen = document.getElementById('btnOpen');
        const btnClose = document.getElementById('btnClose');
        const invGrid = document.getElementById('inv-grid');
        const invCount = document.getElementById('inv-count');
        const notification = document.getElementById('notification');
        const notifItem = document.getElementById('notif-item');
        const confettiCanvas = document.getElementById('confetti-canvas');
        let ctx = confettiCanvas.getContext('2d');
        let animationFrame;
        let particles = [];

        // --- Обновление UI ---
        function updateUI() {
            // Плавное изменение цифр
            animateValue(goldSpan, parseInt(goldSpan.innerText), state.gold, 200);
            animateValue(silverSpan, parseInt(silverSpan.innerText), state.silver, 200);
            
            localStorage.setItem('gold', state.gold);
            localStorage.setItem('silver', state.silver);
            localStorage.setItem('inv', JSON.stringify(state.inv));
            renderInventory();
        }

        function animateValue(element, start, end, duration) {
            if (start === end) return;
            const range = end - start;
            const startTime = performance.now();
            const step = (currentTime) => {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                element.innerText = Math.floor(start + range * progress);
                if (progress < 1) requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
        }

        // --- Переключение вкладок ---
        window.switchTab = function(id, el) {
            if (isSpinning) return;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        };

        // --- Открытие модалки кейса ---
        window.openCaseModal = function(name, price, currency, poolKey) {
            if (isSpinning) return;
            currentCase = { name, price, currency, poolKey };
            modalName.innerText = `${name} (${price} ${currency === 'gold' ? 'G' : 'S'})`;
            
            // Сброс трека
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            
            // Заполняем превью случайными предметами (10 шт)
            const pool = pools[poolKey];
            track.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const rand = pool[Math.floor(Math.random() * pool.length)];
                track.innerHTML += `<div class="weapon-item" style="border-color:${rand.c}"><div style="color:${rand.c}">?</div><div>${rand.n}</div></div>`;
            }
            
            modal.style.display = 'flex';
        };

        window.closeModal = function() {
            if (isSpinning) return;
            modal.style.display = 'none';
        };

        // --- Генерация случайного предмета из пула по шансам ---
        function getRandomItem(pool) {
            const r = Math.random() * 100;
            let cumulative = 0;
            for (const item of pool) {
                cumulative += item.ch;
                if (r <= cumulative) return { ...item }; // копируем, чтобы не мутировать оригинал
            }
            return pool[0]; // fallback
        }

        // --- Запуск рулетки ---
        window.startSpin = function() {
            if (isSpinning) return;
            
            // Проверка баланса
            if (state[currentCase.currency] < currentCase.price) {
                alert(`Недостаточно ${currentCase.currency === 'gold' ? 'золота' : 'серебра'}!`);
                return;
            }

            // Списание валюты
            state[currentCase.currency] -= currentCase.price;
            updateUI();

            isSpinning = true;
            btnOpen.disabled = true;
            btnClose.disabled = true;
            btnOpen.innerText = 'Крутим...';

            const pool = pools[currentCase.poolKey];
            
            // Генерируем 60 случайных предметов
            const items = [];
            for (let i = 0; i < 60; i++) {
                items.push(getRandomItem(pool));
            }

            // Выбираем случайный индекс выигрыша (от 20 до 45, чтобы не с краю)
            const winIndex = Math.floor(Math.random() * 25) + 20; // 20..45
            const winningItem = items[winIndex];

            // Рендерим трек
            track.innerHTML = items.map(item => `
                <div class="weapon-item" style="border-color:${item.c}">
                    <div style="color:${item.c}">⚔️</div>
                    <div>${item.n}</div>
                </div>
            `).join('');

            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';

            // Небольшая задержка перед анимацией
            setTimeout(() => {
                track.style.transition = 'transform 4s cubic-bezier(0.1, 0.9, 0.2, 1)';
                
                const container = document.getElementById('roulette-container');
                const itemWidth = 90 + 8; // ширина + margin
                const containerWidth = container.offsetWidth;
                
                // Сдвиг так, чтобы выигрышный элемент оказался по центру
                const shift = (winIndex * itemWidth) - (containerWidth / 2) + (itemWidth / 2);
                track.style.transform = `translateX(-${shift}px)`;

                // Обработка окончания
                setTimeout(() => {
                    isSpinning = false;
                    btnOpen.disabled = false;
                    btnClose.disabled = false;
                    btnOpen.innerText = 'Открыть ещё';
                    
                    // Добавляем предмет в инвентарь
                    state.inv.push({ ...winningItem, id: Date.now() });
                    updateUI();

                    // Подсветка выигрыша
                    const winElement = track.children[winIndex];
                    if (winElement) {
                        winElement.style.boxShadow = `0 0 30px ${winningItem.c}`;
                        winElement.style.transform = 'scale(1.1)';
                        winElement.style.transition = '0.3s';
                    }

                    // Вибрация (если поддерживается)
                    if (navigator.vibrate) navigator.vibrate(200);

                    // Показываем уведомление
                    notifItem.innerText = winningItem.n;
                    notifItem.style.color = winningItem.c;
                    notification.classList.add('show');
                    setTimeout(() => notification.classList.remove('show'), 3000);

                    // Запускаем конфетти
                    startConfetti(winningItem.c);

                }, 4100); // чуть больше времени анимации (4s + 0.1s)
            }, 50);
        };

        // --- Конфетти (простая реализация) ---
        function startConfetti(color) {
            const colors = ['#ff9f43', '#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', color];
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * confettiCanvas.width,
                    y: Math.random() * confettiCanvas.height - confettiCanvas.height,
                    size: Math.random() * 8 + 4,
                    speed: Math.random() * 5 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                });
            }
            if (animationFrame) cancelAnimationFrame(animationFrame);
            drawConfetti();
        }

        function drawConfetti() {
            ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            ctx.fillStyle = '#ff0';
            for (let p of particles) {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate((p.rotation * Math.PI) / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
                p.y += p.speed;
                p.rotation += 2;
                if (p.y > confettiCanvas.height) {
                    p.y = -10;
                    p.x = Math.random() * confettiCanvas.width;
                }
            }
            animationFrame = requestAnimationFrame(drawConfetti);
        }

        // Останавливаем конфетти через 3 секунды
        setTimeout(() => {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            }
        }, 3000);

        // --- Инвентарь ---
        function renderInventory() {
            invCount.innerText = state.inv.length;
            invGrid.innerHTML = state.inv.slice().reverse().map(item => `
                <div class="inv-item" style="border-color: ${item.c}">
                    <div style="font-weight: 800; font-size: 16px; margin-bottom: 4px;">⚔️</div>
                    <div style="font-size: 11px;">${item.n}</div>
                </div>
            `).join('');
        }

        // --- Инициализация и адаптация под Telegram (опционально) ---
        function initTelegramTheme() {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
                // можно применить цвета темы, но оставим пока свои
            }
        }

        // Устанавливаем размер canvas при изменении окна
        function resizeCanvas() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        initTelegramTheme();
        renderInventory();
        updateUI(); // синхронизация цифр
    })();
</script>
</body>
